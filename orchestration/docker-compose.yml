version: "3.8"

# ─────────────────────────────────────────
# Kestra + Postgres — local development
# Run  : docker compose up -d
# UI   : http://localhost:8080
# Logs : docker compose logs -f kestra
# Stop : docker compose down
# ─────────────────────────────────────────

volumes:
  postgres_data:
  kestra_data:

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB:       kestra
      POSTGRES_USER:     kestra
      POSTGRES_PASSWORD: kestra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kestra"]
      interval: 10s
      timeout: 5s
      retries: 5

  kestra:
    image: kestra/kestra:latest
    pull_policy: always
    entrypoint: /bin/bash
    command:
      - "-c"
      - |
        /app/kestra server standalone --worker-thread=4 &
        SERVER_PID=$$!
        echo "Waiting for Kestra API..."
        until curl -s http://localhost:8080/api/v1/configs > /dev/null 2>&1; do sleep 2; done
        sleep 5
        echo "Importing flows..."
        for f in /app/flows/*.yml; do
          HTTP_CODE=$$(curl -s -o /dev/null -w "%{http_code}" \
            -u "admin@kestra.io:Kestra2024" \
            -X POST "http://localhost:8080/api/v1/flows/import" \
            -F "fileUpload=@$$f")
          echo "  $$f -> HTTP $$HTTP_CODE"
        done
        wait $$SERVER_PID
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra
        kestra:
          server:
            basic-auth:
              enabled: true
              username: admin@kestra.io
              password: Kestra2024
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: /app/storage
          queue:
            type: postgres
          tasks:
            tmp-dir:
              path: /tmp/kestra-wd
          url: http://localhost:8080/
          variables:
            env-vars-prefix: ""
            globals:
              gcp_project: "organic-phoenix-484620-p3"
              gcs_bucket: "organic-phoenix-484620-p3-gdelt-lake"
              environment: "prod"
              github_username: Rajput2000
              github_repo:     GDELT-ANALYSIS

    volumes:
      - kestra_data:/app/storage
      - ./flows:/app/flows
      - ../keys/gdelt-pipeline-sa.json:/secrets/gdelt-sa-key.json:ro
      - /var/run/docker.sock:/var/run/docker.sock

    ports:
      - "8080:8080"
      - "8081:8081"

    depends_on:
      postgres:
        condition: service_healthy
